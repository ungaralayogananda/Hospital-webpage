<!DOCTYPE html>
<html>
<head>
    <title>yoganandas CSS Selectors Example</title>

    <title>CSS Selectors Example</title>

    <style>
        /* Universal Selector */
        * {
            font-family: Arial, sans-serif;
        }

        /* Element Selector */
        h1 {
            color: blue;
        }

        /* ID Selector */
        #mainHeading {
            background-color: yellow;
        }

        /* Class Selector */
        .highlight {
            color: red;
            font-weight: bold;
        }

        /* Group Selector */
        h2, p {
            color: green;
        }
    </style>

</head>
<body>

    <h1 id="mainHeading">CSS Selectors Demonstration</h1>

    <h2>This is a Subheading</h2>

    <p>This paragraph is styled using group selector.</p>

    <p class="highlight">This paragraph uses class selector.</p>

    <p>This is another normal paragraph.</p>

</body>
</html>
