<!DOCTYPE html>
<html>
<head>
    <title>Yogananda’s Table Example</title>
    <title>HTML Table Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 2px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h1>Student Information Table</h1>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Class</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>1</td>
            <td>yogananda</td>
            <td>10</td>
            <td>85</td>
        </tr>

        <tr>
            <td>2</td>
            <td>uday</td>
            <td>10</td>
            <td>90</td>
        </tr>

        <tr>
            <td>3</td>
            <td>anand</td>
            <td>10</td>
            <td>88</td>
        </tr>
    </table>

    <br><br>

    <h2>Table with Colspan and Rowspan</h2>

    <table>
        <tr>
            <th colspan="3">Monthly Sales Report</th>
        </tr>
        <tr>
            <th>Month</th>
            <th>Product A</th>
            <th>Product B</th>
        </tr>
        <tr>
            <td rowspan="2">January</td>
            <td>500</td>
            <td>700</td>
        </tr>
        <tr>
            <td>600</td>
            <td>800</td>
        </tr>
    </table>

</body>
</html>
