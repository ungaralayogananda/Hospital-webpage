<!DOCTYPE html>
<html>
<head>
    <title>yoganandas HTML Text Formatting Tags</title>

    <title>HTML Text Formatting Tags</title>
</head>
<body>

    <h1>HTML Text Formatting Example</h1>

    <p><b>This text is Bold</b></p>
    <p><strong>This text is Strong (Important)</strong></p>

    <p><i>This text is Italic</i></p>
    <p><em>This text is Emphasized</em></p>

    <p><u>This text is Underlined</u></p>

    <p><mark>This text is Highlighted</mark></p>

    <p><small>This text is Small</small></p>

    <p><del>This text is Deleted</del></p>
    <p><ins>This text is Inserted</ins></p>

    <p>H<sub>2</sub>O (Subscript Example)</p>
    <p>X<sup>2</sup> (Superscript Example)</p>

</body>
</html>
