<!DOCTYPE html>
<html>
<head>
  <title>Café Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fafafa;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .product {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      width: 200px;
      text-align: center;
      background: #fff;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 5px;
    }
    .product button {
      margin-top: 10px;
      padding: 8px 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .product button:hover {
      background: #218838;
    }
    #cart {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    pre {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>☕ Yogananda’s Café</h1>

  <div class="products">
    <div class="product">
      <img src="https://via.placeholder.com/200x150?text=Coffee" alt="Coffee">
      <h3>Coffee</h3>
      <p>₹50</p>
      <button onclick="addToCart('coffee')">Add to Cart</button>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/200x150?text=Tea" alt="Tea">
      <h3>Tea</h3>
      <p>₹30</p>
      <button onclick="addToCart('tea')">Add to Cart</button>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/200x150?text=Sandwich" alt="Sandwich">
      <h3>Sandwich</h3>
      <p>₹100</p>
      <button onclick="addToCart('sandwich')">Add to Cart</button>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/200x150?text=Cake" alt="Cake">
      <h3>Cake</h3>
      <p>₹80</p>
      <button onclick="addToCart('cake')">Add to Cart</button>
    </div>
  </div>

  <div id="cart">
    <h2>Your Cart</h2>
    <pre id="billOutput">No items yet.</pre>
  </div>

  <script>
    const menu = {
      coffee: 50,
      tea: 30,
      sandwich: 100,
      cake: 80
    };

    let order = {};

    function addToCart(item) {
      if (!order[item]) {
        order[item] = 0;
      }
      order[item]++;
      calculateBill(order, 0.1, 0.05, "Bunny");
    }

    function calculateBill(order, discount = 0, taxRate = 0.05, customer = "Guest") {
      let subtotal = 0;

      for (let item in order) {
        if (menu[item]) {
          subtotal += menu[item] * order[item];
        }
      }

      let discountAmount = subtotal * discount;
      let afterDiscount = subtotal - discountAmount;
      let tax = afterDiscount * taxRate;
      let total = afterDiscount + tax;

      let billText = `----- Café Bill for ${customer} -----\n`;
      billText += "Items Ordered:\n";
      for (let item in order) {
        billText += `${item} x ${order[item]} = ₹${(menu[item] * order[item]).toFixed(2)}\n`;
      }
      billText += `Subtotal: ₹${subtotal.toFixed(2)}\n`;
      billText += `Discount: ₹${discountAmount.toFixed(2)}\n`;
      billText += `Tax: ₹${tax.toFixed(2)}\n`;
      billText += `Total: ₹${total.toFixed(2)}\n`;
      billText += "---------------------";

      document.getElementById("billOutput").textContent = billText;
    }
  </script>
</body>
</html>
