<!DOCTYPE html>
<html>
<head>
    <title>yoganandas HTML Layout Example</title>

    <title>HTML Layout Example</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            display: flex;
        }

        article {
            flex: 3;
            padding: 20px;
            background-color: #f2f2f2;
        }

        aside {
            flex: 1;
            padding: 20px;
            background-color: #ddd;
        }

        footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <section>
        <article>
            <h2>Main Content</h2>
            <p>This is the main content area of the webpage.</p>
            <p>You can write articles, blog posts, or information here.</p>
        </article>

        <aside>
            <h3>Sidebar</h3>
            <p>This is the sidebar content.</p>
        </aside>
    </section>

    <footer>
        <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

</body>
</html>
