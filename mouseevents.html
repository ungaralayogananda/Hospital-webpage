<!DOCTYPE html>
<html>
<head>
    <title>yoganandas Mouse Events</title>

    <title>Mouse Events</title>

    <style>
        #box {
            width: 300px;
            height: 150px;
            background-color: blue;
            color: white;
            text-align: center;
            line-height: 150px;
            font-size: 20px;
            font-family: sans-serif;
            transition: 0.3s;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Mouse Events</h2>

    <div id="box">
        Move or Click Me
    </div>

    <script>
        const myBox = document.getElementById("box");

        // Mouse Over
        myBox.onmouseover = function () {
            this.style.backgroundColor = "green";
            this.innerText = "Mouse in!";
        };

        // Mouse Out
        myBox.onmouseout = function () {
            this.style.backgroundColor = "blue";
            this.innerText = "Mouse is Out!";
        };

        // Mouse Click
        myBox.onclick = function () {
            this.style.backgroundColor = "red";
            this.innerText = "Box Clicked!";
        };
    </script>

</body>
</html>
