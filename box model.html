<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .box {
            width: 300px;
            height: 150px;
            background-color: lightblue;

            padding: 20px;          
            border: 5px solid blue; 
            margin: 30px;           

            text-align: center;
        }

        .box2 {
            width: 300px;
            height: 150px;
            background-color: lightgreen;

            padding: 10px;
            border: 3px dashed green;
            margin: 20px;
        }
    </style>

</head>
<body>

    <h1>CSS yoganandas Box Model Example</h1>

    <div class="box">
        This is Box 1 <br>
        (Content + Padding + Border + Margin)
    </div>

    <div class="box2">
        This is Box 2 with different values
    </div>

</body>
</html>
