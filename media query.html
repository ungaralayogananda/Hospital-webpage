<!DOCTYPE html>
<html>
<head>
    <title>yoganandas Media Query Example</title>

    <title>Media Query Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background-color: lightblue;
        }

        .box {
            width: 150px;
            height: 150px;
            background-color: steelblue;
            color: white;
            text-align: center;
            line-height: 150px;
            font-size: 20px;
        }

        @media screen and (max-width: 768px) {
            body {
                background-color: lightyellow;
            }

            .container {
                flex-direction: column;
                align-items: center;
            }

            .box {
                margin-bottom: 15px;
                background-color: darkorange;
                font-size: 16px;
            }
        }
    </style>

</head>
<body>

    <h1 style="text-align:center;">Media Query Demo</h1>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

</body>
</html>
